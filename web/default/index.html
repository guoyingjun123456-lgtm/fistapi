    <meta name="theme-color" content="#f5f5f7" />
    <!-- Pre-paint background to prevent a white flash before JS/CSS loads (FOUC).
         Matches the app's light canvas; dark-mode users may briefly see this
         light tone, which is far less jarring than a pure-white flash. -->
    <style>
      html,
      body {
        margin: 0;
        background-color: #f5f5f7;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background-color: #f5f5f7;
        }
      }
    </style>
